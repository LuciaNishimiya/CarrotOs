# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER  # Sets "Windows" key as main modifier

# --- Aplicaciones ---
$terminal = kitty
$fileManager = thunar
$browser = flatpak run app.zen_browser.zen
$menu = ~/.config/rofi/scripts/launcher
$config = code ~/.config/hypr/ ~/.config/waybar ~/.config/rofi
$clipboard = ~/.config/rofi/scripts/clipvault

# Super + C → Abrir terminal
# Super + E → Abrir gestor de archivos   
# Super + B → Abrir navegador
# Super + R → Abrir lanzador de aplicaciones
# Super + F9 → Abrir Configuración (archivos de Hyprland, Waybar, Rofi)
# Super + Space → Abrir gestor de portapapeles
bind = $mainMod, C, exec, $terminal 
bind = $mainMod, E, exec, $fileManager 
bind = $mainMod, B, exec, $browser 
bind = $mainMod, R, exec, $menu 
bind = $mainMod, F9, exec, $config
bind = $mainMod, SPACE, exec, $clipboard


# --- Capturas de pantalla ---
# Print → Todas las pantallas
# Shift + Print → Seleccionar región
# Ctrl + Print → Solo monitor activo (enfocado)
bind = , Print, exec, ~/.config/hypr/scripts/screenshot.sh
bind = SHIFT, Print, exec, ~/.config/hypr/scripts/screenshot.sh region
bind = CTRL, Print, exec, ~/.config/hypr/scripts/screenshot.sh focused


# --- Sesión y energía (Super + F1-F5) ---
# Super + F1 → Cerrar sesión
# Super + F2 → Bloquear sesión
# Super + F3 → Suspender
# Super + F4 → Reiniciar
# Super + F5 → Hibernar
bind = $mainMod, F1, exec, hyprctl dispatch exit
bind = $mainMod, F2, exec, hyprlock 
bind = $mainMod, F3, exec, systemctl suspend
bind = $mainMod, F4, exec, systemctl reboot
bind = $mainMod, F5, exec, systemctl hibernate


# --- hyprpaper y waybar ---
# Super + ALT + P → Recargar fondo de pantalla
# Super + ALT + B → Recargar Waybar
bind = $mainMod ALT, P, exec, ~/.config/hypr/scripts/reload-hyprpaper.sh 
bind = $mainMod ALT, B, exec, ~/.config/waybar/reload-waybar.sh


# --- Gestión de ventanas ---
# Super + Q → Cerrar ventana activa
# Super + T → Alternar entre modo en mosaico y flotante
# Super + F → Alternar pantalla completa
# Super + ALT + F → Alternar pantalla completa
# Super + P → Alternar modo pseudo (ventana ocupa espacio sin reorganizar otras)
# Super + J → Alternar división del layout (dwindle)
bind = $mainMod, Q, killactive, 
bind = $mainMod, T, togglefloating 
bind = $mainMod, F, fullscreen, 1
bind = $mainMod ALT, F, fullscreen
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, layoutmsg, togglesplit


# --- Movimiento de foco ---
# Super + Flechas → Mover el foco entre ventanas
bind = $mainMod, left, movefocus, l     
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# --- Espacios de trabajo ---
# Super + [0-9] → Cambiar de espacio de trabajo
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Super + Shift + [0-9] → Mover ventana activa a un espacio de trabajo
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


# --- Espacio especial (scratchpad) ---
# Super + S → Mostrar/ocultar espacio especial "magic"
# Super + Shift + S → Mover ventana activa al espacio especial
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic


# --- Navegación entre espacios con Tab ---
# Super + Tab → Siguiente espacio de trabajo activo 
bind = $mainMod, Tab, workspace, e+1

# --- Navegación entre espacios con rueda del ratón ---
# Super + Rueda abajo → Siguiente espacio
# Super + Rueda arriba → Espacio anterior
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# --- Mover y redimensionar ventanas con ratón ---
# Super + Click izquierdo → Mover ventana
# Super + Click derecho → Redimensionar ventana
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# --- Teclas multimedia ---
# Subir volumen
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
# Bajar volumen
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
# Silenciar volumen
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
# Silenciar micrófono
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
# Subir brillo
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
# Bajar brillo
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
